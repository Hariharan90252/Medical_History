<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration - Medical History</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="root">
    <h1 class="header-title">Patient Registration</h1>
    <div class="form-container">
      <form action="/signin" method="POST">
        <input type="hidden" name="role" value="patient">
        
        <div class="form-group">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" id="fullName" name="fullName" class="form-input" required placeholder="e.g. Jane Doe">
        </div>
        
        <div class="form-group">
          <label for="dob" class="form-label">Date of Birth</label>
          <input type="date" id="dob" name="dob" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label for="phone" class="form-label">Contact Number</label>
          <input type="tel" id="phone" name="phone" class="form-input" required placeholder="e.g. +1 234 567 8900">
        </div>

        <div class="form-group">
          <label for="bloodGroup" class="form-label">Blood Group</label>
          <select id="bloodGroup" name="bloodGroup" class="form-input" required style="background-color: white;">
            <option value="" disabled selected>Select Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" required placeholder="Enter your password">
        </div>
        <div class="button-container">
          <button type="submit" class="btn btn-patient" style="width: 100%;">Register</button>
        </div>
        <div style="text-align: center; margin-top: 15px;">
          <p style="margin: 0; color: #333;">I have an account. <a href="/Patient/login.html" style="color: #2ed573; text-decoration: none; font-weight: bold;">Login</a></p>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
