<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Medical History</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root">
    <h1 class="header-title">Account Login</h1>
    <div class="form-container">
      <form action="/login" method="POST">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" required placeholder="Enter your password">
        </div>
        <div class="button-container">
          <button type="submit" class="btn btn-doctor" style="width: 100%;">Sign In</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
