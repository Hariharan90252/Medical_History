<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Medical History</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root">
    <img src="../src/logo.png" alt="Medical History Logo" style="position: absolute; top: 20px; left: 20px; max-width: 80px;">
    <h1 class="header-title">Dashboard</h1>
    <div class="form-container" style="max-width: 600px; text-align: center;">
      <h2 style="color: #333; margin-bottom: 20px;">Patient Profile</h2>
      <div id="patient-details" style="text-align: left; margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: #fcfcfc;">
        <p style="margin: 10px 0; color: #333;"><strong>Full Name:</strong> <span id="detail-name">Loading...</span></p>
        <p style="margin: 10px 0; color: #333;"><strong>Date of Birth:</strong> <span id="detail-dob">Loading...</span></p>
        <p style="margin: 10px 0; color: #333;"><strong>Contact Number:</strong> <span id="detail-phone">Loading...</span></p>
        <p style="margin: 10px 0; color: #333;"><strong>Blood Group:</strong> <span id="detail-bloodGroup">Loading...</span></p>
        <p style="margin: 10px 0; color: #333;"><strong>Email:</strong> <span id="detail-email">Loading...</span></p>
      </div>

      <div id="otp-section" style="margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: #fcfcfc;">
        <h3 style="color: #333; margin-top: 0; margin-bottom: 10px;">Medical Access Code</h3>
        <p style="color: #666; font-size: 14px; margin-bottom: 15px;">Generate a temporary code to share your medical history with a doctor.</p>
        <div id="otp-display-container" style="display: none; margin-bottom: 15px;">
          <div style="font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #2ed573;" id="otp-code"></div>
          <div style="color: #ff4757; font-size: 14px; margin-top: 5px;" id="otp-timer"></div>
        </div>
        <button id="generate-otp-btn" class="btn btn-patient" style="width: 100%;" onclick="generateOTP()">Create a code</button>
      </div>

      <div class="button-container">
        <button class="btn btn-patient" onclick="window.location.href='/'">Logout</button>
      </div>
    </div>
  </div>

  <script>
    // Get the personalized details from the URL
    const urlParams = new URLSearchParams(window.location.search);

    // Helper function to safely get parameters and ignore 'undefined' or blank strings
    const getParam = (paramName) => {
      const val = urlParams.get(paramName);
      return (val && val !== 'undefined' && val !== '') ? val : null;
    };

    const name = getParam('name');
    const dob = getParam('dob');
    const phone = getParam('phone');
    const bloodGroup = getParam('bloodGroup');
    const email = getParam('email');

    // Apply the values to the HTML. If missing, show N/A.
    document.getElementById('detail-name').innerText = name || 'N/A';
    document.getElementById('detail-dob').innerText = dob || 'N/A';
    document.getElementById('detail-phone').innerText = phone || 'N/A';
    document.getElementById('detail-bloodGroup').innerText = bloodGroup || 'N/A';
    document.getElementById('detail-email').innerText = email || 'N/A';

    // OTP Generation logic
    let timerInterval;

    function generateOTP() {
      // Generate a random 6-digit code
      const otp = Math.floor(100000 + Math.random() * 900000);
      document.getElementById('otp-code').innerText = otp;
      document.getElementById('otp-display-container').style.display = 'block';
      document.getElementById('generate-otp-btn').style.display = 'none';

      // Save OTP to database
      fetch('/api/generate-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, otp: otp.toString() })
      });

      // 15 minutes in seconds
      let timeLeft = 15 * 60;
      
      // Clear any existing timer just in case
      clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('otp-timer').innerText = `Valid for: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          document.getElementById('otp-code').innerText = 'EXPIRED';
          document.getElementById('otp-timer').innerText = '';
          document.getElementById('generate-otp-btn').style.display = 'block';
          document.getElementById('generate-otp-btn').innerText = 'Generate New Code';
        }
        timeLeft -= 1;
      }, 1000);
    }
  </script>
</body>
</html>
