<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Registration - Medical History</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="root">
    <h1 class="header-title">Doctor Registration</h1>
    <div class="form-container">
      <form action="/signin" method="POST">
        <input type="hidden" name="role" value="doctor">
        
        <div class="form-group">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" id="fullName" name="fullName" class="form-input" required placeholder="Dr. John Doe">
        </div>
        <div class="form-group">
          <label for="licenseNumber" class="form-label">Medical License Number</label>
          <input type="text" id="licenseNumber" name="licenseNumber" class="form-input" required placeholder="e.g. MD1234567">
        </div>
        <div class="form-group">
          <label for="specialty" class="form-label">Specialty</label>
          <input type="text" id="specialty" name="specialty" class="form-input" required placeholder="e.g. Cardiology">
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" required placeholder="Enter your password">
        </div>
        <div class="button-container">
          <button type="submit" class="btn btn-doctor" style="width: 100%;">Register</button>
        </div>
        
        <div style="text-align: center; margin-top: 15px;">
          <p style="margin: 0; color: #333;">I have an account. <a href="/Doctor/login.html" style="color: #2ed573; text-decoration: none; font-weight: bold;">Login</a></p>
        </div>
      </form>
    </div>
    <div style="text-align: center; margin-top: 20px;">
      <button class="btn" style="background-color: #333;" onclick="window.location.href='/'">Go Back</button>
    </div>
  </div>
</body>
</html>
